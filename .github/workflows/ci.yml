name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install flake8 mypy
          flake8 .
          mypy .

      - name: Run tests
        run: pytest -v --maxfail=1 --disable-warnings

      - name: Build Docker images
        run: |
          docker build -t callsage-api -f infra/docker/Dockerfile.api .
          docker build -t callsage-worker -f infra/docker/Dockerfile.worker .
